name: 🤖 Blog Automator Full

on:
  schedule:
    # 12:00 e 00:00 UTC equivalem a 09:00 e 21:00 no Brasil (GMT-3)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Permite que você rode manualmente se quiser testar

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  automacao:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar Dependências
        run: pip install -U google-generativeai feedparser

      - name: 🚀 Gerar Post com IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python automator.py

      - name: 💾 Salvar Post no Repo
        run: |
          git config --global user.name "Blog Automator Bot"
          git config --global user.email "bot@blog-automator.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "📝 Novo post automático" && git push)

      - name: 🏗️ Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: 🔨 Build Hugo
        run: |
          rm -rf public
          hugo --minify --gc --baseURL "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: 📤 Upload e Deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: 🌐 Finalizar Deploy
        uses: actions/deploy-pages@v4
        