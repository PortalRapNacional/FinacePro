name: 🤖 Blog Automator Full

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check-changes.outputs.has_changes }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install google-genai feedparser

      - name: 🗂️ Criar cache IA
        run: mkdir -p .gemini_cache

      - name: 🚀 Gerar Post com IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GEMINI_TIER: ${{ vars.GEMINI_TIER || 'free' }}
        run: python automator.py
        continue-on-error: false
      - name: 💾 Salvar Post no Repo
        id: commit-posts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- content/posts/ historico.txt; then
            echo "ℹ️ Sem novos posts."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git add content/posts/ historico.txt .gemini_cache/
            git commit -m "📝 Auto-post: $(date +'%Y-%m-%d')"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 🏗️ Setup Hugo (v0.146.0)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.146.0"
          extended: true

      - name: 🔨 Build Hugo
        run: |
          hugo --minify --gc --baseURL "${{ secrets.SITE_URL || 'https://PortalRapNacional.github.io/FinacePro/' }}"
          if [ ! -d "public" ] || [ -z "$(ls -A public 2>/dev/null)" ]; then
            echo "❌ Build falhou: pasta public vazia"
            exit 1
          fi

      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: 📋 Check final
        id: check-changes
        run: |
          if [[ "${{ steps.commit-posts.outputs.has_changes }}" == "true" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: build
    if: needs.build.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🌐 Deploy GitHub Pages
        uses: actions/deploy-pages@v4
