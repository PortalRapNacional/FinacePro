name: Auto Blog MEI

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install feedparser google-generativeai

      - name: Rodar o Robô de IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python automator.py

      - name: Salvar Mudanças no Repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🤖 Auto-post: Novos artigos e histórico atualizado" || echo "Sem mudanças"
          git push
          
      - name: Baixar Tema PaperMod
        run: |
          mkdir -p themes
          THEME_URL="https://github.com
          git clone --depth=1 $THEME_URL themes/PaperMod

      - name: Build Hugo
        run: |
          HUGO_URL="https://github.com
          wget $HUGO_URL -O hugo.tar.gz
          tar -xzf hugo.tar.gz
          ./hugo --minify


      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
