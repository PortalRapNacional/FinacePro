name: 🤖 Blog Automator Full

on:
  schedule:
    - cron: "0 12 * * *" # Roda todo dia ao meio-dia
  workflow_dispatch: # Permite que você rode manualmente pelo botão "Run workflow"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  automacao-completa:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar Dependências
        run: |
          pip install feedparser google-generativeai

      - name: 🚀 Gerar Post com IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python automator.py

      - name: 💾 Salvar Post no Repo
        run: |
          git config --global user.name "Blog Automator Bot"
          git config --global user.email "bot@blog-automator.com"
          git add .
          # Só faz commit se houver novos arquivos (posts)
          git diff --quiet && git diff --staged --quiet || (git commit -m "📝 Novo post automático" && git push)

      - name: 🏗️ Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: 🔨 Build Hugo
        run: |
          rm -rf public # Remove a pasta public para evitar conflitos
          hugo --minify --gc --baseURL "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./public"

  deploy:
    needs: automacao-completa
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🌐 Finalizar Deploy
        id: deployment
        uses: actions/deploy-pages@v4
