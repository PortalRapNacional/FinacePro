name: 🤖 Blog Automator Full v4.5

on:
  schedule:
    # ✅ Execução ÚNICA diária às 03:00 UTC (meia-noite BR) — reduz chamadas API em 50%
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: 📦 Dependências
        run: |
          pip install --upgrade pip
          pip install google-genai feedparser

      - name: 🗂️ Cache dir
        run: mkdir -p .gemini_cache

      - name: 🚀 Gerar Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GEMINI_TIER: ${{ vars.GEMINI_TIER || 'free' }}  # ← Define free/pago
        run: python automator.py
        continue-on-error: false

      - name: 💾 Commit se houver novo post
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- content/posts/ historico.txt; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git add content/posts/ historico.txt .gemini_cache/
            git commit -m "📝 Auto-post: $(date +'%Y-%m-%d')"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 🏗️ Hugo 0.146.0 (PaperMod compat)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.146.0"
          extended: true

      - name: 🔨 Build
        run: |
          hugo --minify --gc --baseURL "${{ secrets.SITE_URL || 'https://PortalRapNacional.github.io/FinacePro/' }}"
          test -d public && test -n "$(ls -A public)" || exit 1

      - name: 📤 Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: 📋 Check
        id: check
        run: |
          if [[ "${{ steps.commit.outputs.has_changes }}" == "true" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: build
    if: needs.build.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: 🌐 Deploy
        id: deploy
        uses: actions/deploy-pages@v4
