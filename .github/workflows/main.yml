name: 🤖 Blog Automator Full v5.0

on:
  schedule:
    # ✅ Execução ÚNICA diária às 03:00 UTC (meia-noite BR) 
    # Ideal para pegar as notícias do dia anterior e postar fresquinho.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: 📦 Instalar Dependências
        run: |
          pip install --upgrade pip
          pip install feedparser
          # ✅ Removido google-genai pois o v5.0 usa urllib (OpenRouter)

      - name: 🗂️ Garantir pastas de Cache e Conteúdo
        run: |
          mkdir -p .ai_cache
          mkdir -p content/posts

      - name: 🚀 Gerar Post via OpenRouter
        env:
              GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
              PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

        run: python automator.py

      - name: 💾 Salvar Alterações (Git Commit)
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Verifica se o script criou novos arquivos ou alterou o histórico
          if git diff --quiet -- content/posts/ historico.txt; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Nenhuma mudança detectada."
          else
            git add content/posts/ historico.txt .ai_cache/
            git commit -m "📝 Auto-post FinacePro: $(date +'%Y-%m-%d')"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Novos posts detectados e commitados."
          fi

      - name: 🏗️ Setup Hugo (Versão Estável)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.146.0"
          extended: true

      - name: 🔨 Build Hugo
        run: |
          # O baseURL será injetado pelo Segredo ou usa o padrão do repo
          hugo --minify --gc --baseURL "https://PortalRapNacional.github.io/FinacePro/"

      - name: 📤 Upload Artefato do Site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    # Só faz o deploy se houver novos posts ou se você rodar manualmente
    if: needs.build.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🌐 Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
