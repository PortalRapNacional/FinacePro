baseURL = "https://PortalRapNacional.github.io/FinacePro/"
languageCode = "pt-br"
title = "FinacePro | Crédito, MEI e Soluções Financeiras"
theme = "PaperMod"
disableKinds = ["taxonomy", "term"]

# ✅ Paginação ideal para SEO e carregamento rápido
[pagination]
  pagerSize = 12

[params]
  env = "production"
  title = "FinacePro"
  description = "Guia de autoridade sobre cartões de crédito para MEI, empréstimos empresariais e inteligência financeira."
  author = "Conselho Editorial FinacePro"
  
  # ✅ Estética de Elite (Casando com o novo CSS)
  defaultTheme = "light"
  disableThemeToggle = true # Mantém a identidade Slate/Indigo fixa
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowShareButtons = true
  ShowFullTextContent = false # Exibe apenas o resumo (melhor para cliques)

  # ✅ Configuração de Sumário (TOC) para SEO
  [params.toc]
    enable = true
    open = false # Design limpo: o usuário abre se precisar
    
  # ✅ Configuração de Imagens (Capa)
  [params.cover]
    linkFullImages = true
    responsiveImages = true
    hiddenInList = false 
    hiddenInSingle = false

  # ✅ Texto de Boas-Vindas (Landing Page Magnética)
  [params.homeInfoParams]
    Title = "💰 Inteligência em Crédito e Gestão para MEI"
    Content = "Análises técnicas de cartões, crédito para empresas e estratégias para a saúde financeira do seu negócio."

  # ✅ Rodapé Profissional (Exigência AdSense para credibilidade)
  [params.footer]
    hideCopyright = false
    content = "FinacePro © 2026 - O seu portal de inteligência financeira. Todos os direitos reservados."

  # ✅ Redes Sociais
  [[params.socialIcons]]
    name = "email"
    url = "mailto:contato@finacepro.com"

# ✅ Configurações de Build para garantir que os posts apareçam
[build]
  publishResources = true
  renderDrafts = false
  renderFuture = true
  renderExpired = false

# ✅ Menu Estruturado para Alto CPC (Custo por Clique)
[[menu.main]]
  name = "💳 Cartões"
  url = "/posts/"
  weight = 10
[[menu.main]]
  name = "🏢 MEI"
  url = "/posts/"
  weight = 20
[[menu.main]]
  name = "📈 Empréstimos"
  url = "/posts/"
  weight = 30
[[menu.main]]
  name = "Sobre"
  url = "/about"
  weight = 40
[[menu.main]]
  name = "Privacidade"
  url = "/privacy"
  weight = 50
