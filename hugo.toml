baseURL = "https://PortalRapNacional.github.io/FinacePro/"
languageCode = "pt-br"
title = "FinacePro | Crédito, MEI e Soluções Financeiras"
theme = "PaperMod"
disableKinds = ["taxonomy", "term"]

[pagination]
  pagerSize = 12

[params]
  env = "production"
  title = "FinacePro"
  description = "Guia de autoridade sobre cartões de crédito para MEI e finanças."
  author = "Conselho Editorial FinacePro"
  
  defaultTheme = "light"
  disableThemeToggle = true 
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowFullTextContent = false 

  [params.cover]
    linkFullImages = true
    responsiveImages = true
    hiddenInList = false 

  [params.footer]
    hideCopyright = false
    content = "FinacePro © 2026 - Inteligência Financeira."

[[menu.main]]
  name = "💳 Cartões"
  url = "/posts/"
  weight = 10
