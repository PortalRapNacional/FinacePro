baseURL = "https://PortalRapNacional.github.io/FinacePro/"
languageCode = "pt-br"
title = "FinacePro | Crédito, MEI e Soluções Financeiras"
theme = "PaperMod"
disableKinds = ["taxonomy", "term"]

# ✅ CORREÇÃO OBRIGATÓRIA: Substitui "paginate = 12"
[pagination]
pagerSize = 12

[params]
env         = "production"
title       = "FinacePro"
description = "Guia completo sobre cartões de crédito para MEI, empréstimos e educação financeira."
author      = "Conselho Editorial FinacePro"   # E-E-A-T: nome institucional
defaultTheme    = "light"
disableThemeToggle = true
ShowReadingTime    = true
ShowBreadCrumbs    = true
ShowPostNavLinks   = true
ShowCodeCopyButtons = true
ShowShareButtons   = true
ShowToc            = true   # Índice automático — aumenta tempo na página

[params.cover]
linkFullImages = true
responsiveImages = true

[params.homeInfoParams]
Title   = "💰 Inteligência Financeira e Crédito para MEI"
Content = "As melhores análises de cartões, crédito empresarial e dicas para organizar as finanças do seu negócio."

# DESIGN PREMIUM: variáveis CSS para assets/css/extended/custom.css
# Preto Profundo: #111111 | Dourado Nobre: #C5A059 | Fundo Creme: #FAFAF8

[[params.socialIcons]]
name = "email"
url  = "mailto:contato@finacepro.com"

[build]
publishResources = true
renderDrafts     = true
renderFuture     = true
renderExpired    = true

[[menu.main]]
name   = "💳 Cartões"
url    = "/posts/"
weight = 10

[[menu.main]]
name   = "🏢 MEI"
url    = "/posts/"
weight = 20

[[menu.main]]
name   = "📈 Empréstimos"
url    = "/posts/"
weight = 30

[[menu.main]]
name   = "Sobre"
url    = "/about"
weight = 40

[[menu.main]]
name   = "Privacidade"
url    = "/privacy"
weight = 50
