baseURL = "https://github.io"
languageCode = "pt-br"
title = "FinacePro | Crédito, MEI e Soluções Financeiras"
theme = "PaperMod"
paginate = 12

disableKinds = ["taxonomy", "term"]

[params]
  env = "production"
  title = "FinacePro"
  description = "Guia completo sobre cartões de crédito para MEI, empréstimos e educação financeira."
  author = "Redação FinacePro"
  
  # Essencial para AdSense: Fundo claro e leitura fácil
  defaultTheme = "light"
  disableThemeToggle = true # Mantém o site sempre claro (melhor para anúncios)
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  
  # Layout de Portal de Notícias
  [params.homeInfoParams]
    Title = "💰 Inteligência Financeira e Crédito para MEI"
    Content = "As melhores análises de cartões, crédito empresarial e dicas para organizar as finanças do seu negócio."

  # SEO e Social
  [[params.socialIcons]]
    name = "email"
    url = "mailto:contato@finacepro.com"

# Menu focado nos nichos de alto valor (High CPM)
[[menu.main]]
    name = "💳 Cartões"
    url = "/posts/"
    weight = 10
[[menu.main]]
    name = "🏢 MEI"
    url = "/posts/"
    weight = 20
[[menu.main]]
    name = "📈 Empréstimos"
    url = "/posts/"
    weight = 30
[[menu.main]]
    name = "Sobre"
    url = "/about"
    weight = 40
