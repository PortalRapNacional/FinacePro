baseURL = "https://github.io"
languageCode = "pt-br"
title = "Finanças para MEI | FinacePro"
theme = "PaperMod"
paginate = 10

# ISSO MATA O ERRO "NOT A DIRECTORY"
disableKinds = ["taxonomy", "term"]

[params]
  env = "production"
  title = "Finanças MEI"
  description = "Dicas sobre cartões de crédito e empréstimos para MEI."
  author = "Blog Automator"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true

  [params.homeInfoParams]
    Title = "💳 Inteligência Financeira para MEI"
    Content = "As melhores estratégias de crédito e cartões em um só lugar."

[[menu.main]]
    identifier = "posts"
    name = "📝 Artigos"
    url = "/posts/"
    weight = 10

[[menu.main]]
    identifier = "sobre"
    name = "Sobre"
    url = "/about"
    weight = 20
