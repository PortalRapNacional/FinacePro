/* =============================================================
   FinacePro — Design Elite v5.5 (Final Ultra-Fix)
   Status: AdSense Ready | Grid 2 Colunas | Menu Topo
   ============================================================= */

:root {
  --finace-bg:       #F8FAFC;
  --finace-top-bg:   #0F172A; 
  --finace-primary:   #4F46E5; 
  --finace-text:      #334155;
  --finace-titles:    #1E293B;
  --finace-border:    #E2E8F0;
  --finace-radius:    16px;
}

/* --- RESET DE ESTRUTURA --- */
html, body {
    display: block !important;
    margin: 0 !important;
    padding: 0 !important;
    background-color: var(--finace-bg) !important;
    font-family: 'Inter', sans-serif;
}

.main {
    display: block !important;
    max-width: 1100px;
    margin: 0 auto !important;
    padding: 20px;
    float: none !important;
}

/* --- HEADER (MENU NO TOPO) --- */
.header {
    display: block !important; 
    background: var(--finace-top-bg) !important;
    border-bottom: 2px solid var(--finace-primary);
    width: 100% !important;
    position: relative;
    z-index: 999;
}

.nav {
    display: flex !important;
    justify-content: space-between;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
    padding: 10px 20px;
}

.nav a, .logo a, .menu a, .menu li a, #menu-trigger {
    color: #FFFFFF !important;
    font-weight: 700 !important;
    text-decoration: none !important;
    opacity: 1 !important;
}

/* --- GRID DE POSTS (MODO PORTAL) --- */
@media screen and (min-width: 768px) {
    .list:not(.profile) {
        display: grid !important;
        grid-template-columns: repeat(2, 1fr) !important; 
        gap: 30px !important;
        padding-top: 20px;
        float: none !important;
    }
}

/* --- CARDS PREMIUM --- */
.post-entry {
    background: #FFFFFF !important;
    border: 1px solid var(--finace-border) !important;
    border-radius: var(--finace-radius) !important;
    padding: 25px !important;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05) !important;
    transition: transform 0.3s ease !important;
    display: flex;
    flex-direction: column;
    height: 100%;
}

.post-entry:hover {
    transform: translateY(-5px);
    border-color: var(--finace-primary) !important;
}

.entry-cover img {
    border-radius: 12px 12px 0 0 !important;
    width: 100%;
    height: 220px;
    object-fit: cover;
    margin-bottom: 15px;
}

/* --- CTAs --- */
.entry-footer a, .read-more {
    background: var(--finace-primary) !important;
    color: #FFFFFF !important;
    border-radius: 8px !important;
    padding: 10px 20px !important;
    display: inline-block;
    font-weight: 600;
}

footer {
    text-align: center;
    padding: 40px;
    background: white;
    border-top: 1px solid var(--finace-border);
    margin-top: 50px;
}
