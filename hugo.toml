baseURL = "https://PortalRapNacional.github.io/FinacePro/"
languageCode = "pt-br"
title = "FinacePro | Crédito, MEI e Soluções Financeiras"
theme = "PaperMod"
disableKinds = ["taxonomy", "term"]

# ✅ Paginação para versões recentes do Hugo
[pagination]
  pagerSize = 12

[params]
  env = "production"
  title = "FinacePro"
  description = "Guia completo sobre cartões de crédito para MEI, empréstimos e educação financeira."
  author = "Conselho Editorial FinacePro"
  
  # Estética Premium e AdSense
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowShareButtons = true
  ShowToc = true
  ShowFullTextContent = false # Estilo portal: mostra apenas o resumo na home

  # Configuração de Imagens (Capa)
  [params.cover]
    linkFullImages = true
    responsiveImages = true
    hiddenInList = false 
    hiddenInSingle = false

  # Layout da Home
  [params.homeInfoParams]
    Title = "💰 Inteligência Financeira e Crédito para MEI"
    Content = "As melhores análises de cartões, crédito empresarial e dicas para organizar as finanças do seu negócio."

  # Ícones Sociais
  [[params.socialIcons]]
    name = "email"
    url = "mailto:contato@finacepro.com"

[build]
  publishResources = true
  renderDrafts = true
  renderFuture = true
  renderExpired = true

# Menu focado em High CPM e Autoridade
[[menu.main]]
  name = "💳 Cartões"
  url = "/posts/"
  weight = 10
[[menu.main]]
  name = "🏢 MEI"
  url = "/posts/"
  weight = 20
[[menu.main]]
  name = "📈 Empréstimos"
  url = "/posts/"
  weight = 30
[[menu.main]]
  name = "Sobre"
  url = "/about"
  weight = 40
[[menu.main]]
  name = "Privacidade"
  url = "/privacy"
  weight = 50
